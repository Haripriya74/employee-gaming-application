<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Employee Gaming Portal</title>

    <link rel="stylesheet"
          href="css/home.css">

</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="logo-section">

            <img src="images/logo.jpg"
                 alt="Logo">

            <div>

                <h2 class="brand-title">EMPLOYEE GAMING PORTAL</h2>

            </div>

        </div>

    </header>

    <!-- HERO -->

    <section class="hero">

        <h1>
            EMPLOYEE
            <span>GAMING PORTAL</span>
        </h1>

        <p>

            Test your knowledge,
            improve your skills
            and compete with
            your colleagues.

        </p>

    </section>

    <!-- DASHBOARD -->

    <section class="stats">

        <div class="card">

            <h2 id="players">0</h2>

            <p>Total Employees</p>

        </div>

        <div class="card">

            <h2 id="games">0</h2>

            <p>Total Games</p>

        </div>

    </section>

    <!-- LOGIN BUTTONS -->

    <section class="login-section">

        <a href="../admin/admin-login.html">

            <button class="admin-btn">

                ⚙️ Admin Login

            </button>

        </a>

        <a href="login.html">

            <button class="employee-btn">

                🎮 Employee Login

            </button>

        </a>

    </section>

    <!-- FEATURES -->

    <section class="features">

        <div class="feature">

            🧩

            <h3>Puzzles</h3>

        </div>

        <div class="feature">

            🏆

            <h3>Compete & Win</h3>

        </div>

        <div class="feature">

            🎯

            <h3>Improve Skills</h3>

        </div>

        <div class="feature">

            📊

            <h3>Track Progress</h3>

        </div>

    </section>

    <script src="js/home.js"></script>

</body>

</html>
