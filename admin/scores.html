<!DOCTYPE html>
<html>
<head>
    <title>Employee Scores</title>
    <link rel="stylesheet" href="css/admin-style.css">
</head>
<body>
<div class="dashboard">

    <h1 class="dashboard-title">📊 Employee Scores</h1>

    <div class="stats">

        <div class="stat-card">
            <h2 id="totalEmployees">0</h2>
            <p>Total Employees</p>
        </div>

        <div class="stat-card">
            <h2 id="totalGames">0</h2>
            <p>Games Played</p>
        </div>

        <div class="stat-card">
            <h2 id="highestScore">0</h2>
            <p>Highest Score</p>
        </div>

        <div class="stat-card">
            <h2 id="averageScore">0</h2>
            <p>Average Score</p>
        </div>

    </div>

    <div id="scoreList"></div>

</div>
<script src="js/scores.js"></script>
</body>
</html>
